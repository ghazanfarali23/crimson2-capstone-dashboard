# AWS Amplify Hosting — static site (`index.html` at repository root).
# No npm/Webpack step: the console runs an empty "build" echo and publishes `baseDirectory`.
version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static site — no build artifacts to produce."
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
